# ══════════════════════════════════════════════════════════════════════════════
# CONFIGURACIÓN DE LOGGING
# ══════════════════════════════════════════════════════════════════════════════
logging:
  log_level: INFO
  
  # Eventos a registrar
  log_events:
    - sync_start
    - sync_end
    - validation_errors
    - matching_results
    - exceptions_created
  
  # Métricas a calcular
  metrics:
    - total_records
    - new_records
    - duplicates_skipped
    - validation_pass_rate
    - match_rate
    - exception_count

# ══════════════════════════════════════════════════════════════════════════════
# CONFIGURACIÓN DE SYNC (Delta Strategy)
# ══════════════════════════════════════════════════════════════════════════════
sync_strategy:
  # Estrategia: Incremental por clave_acceso
  mode: INCREMENTAL
  unique_key: clave_acceso
  
  # Comportamiento ante duplicados
  on_duplicate:
    action: SKIP
    log_warning: true
  
  # Ventana de procesamiento (días hacia atrás)
  lookback_days: 90