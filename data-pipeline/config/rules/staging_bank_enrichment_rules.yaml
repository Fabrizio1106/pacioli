# -----------------------------------------------------------------------------
# 3. CONFIGURACIÓN HEURÍSTICA
# -----------------------------------------------------------------------------
heuristic_rules:
  # Tipos de transacción a procesar
  target_trans_types:
    - "TRANSFERENCIA DIRECTA"
    - "TRANSFERENCIA SPI"
    - "OTROS"
    - "TRANSFERENCIA EXTERIOR"
  
  # ───────────────────────────────────────────────────────────────────────
  # UMBRALES DE CONFIANZA (Ajustados para máxima precisión)
  # ───────────────────────────────────────────────────────────────────────
  thresholds:
    # Histórico - Número exacto (máxima confianza)
    historical_exact_match: 98
    
    # Histórico - Fuzzy por nombre (4 años de mapeo manual)
    historical_fuzzy_match: 90
    
    # Maestro SAP - Fuzzy (base oficial)
    master_fuzzy_match: 88
    
    # Portfolio - Fuzzy (último recurso, validación estricta)
    portfolio_fuzzy_match: 90

# -----------------------------------------------------------------------------
# 4. REGLAS PARA DEPÓSITOS EN EFECTIVO (ESTRATEGIA V7)
# -----------------------------------------------------------------------------
cash_deposit_rules:
  enabled: true
  
  # Parámetros técnicos del Algoritmo de Secuencias (V7)
  strategy_v7_params:
    time_gap_minutes: 5.0
    seq_gap_threshold: 100
    vip_purity_thresh: 0.65

  # ═══════════════════════════════════════════════════════════════════════
  # PATRÓN: URBAPARKING
  # ═══════════════════════════════════════════════════════════════════════
  parking:
    customer_id: "400419"
    customer_name: "URBAPARKING - EFECTIVO"
  # ═══════════════════════════════════════════════════════════════════════
  # PATRÓN: EFECTIVO - PENDIENTE CLASIFICAR
  # ═══════════════════════════════════════════════════════════════════════
  unknown_orphan:
    customer_id: '999998'  # ← Diferente de VIP
    customer_name: 'EFECTIVO - PENDIENTE CLASIFICAR'
    confidence_score: 50

  # ═══════════════════════════════════════════════════════════════════════
  # PATRÓN: SALAS VIP
  # ═══════════════════════════════════════════════════════════════════════
  salas_vip:
    customer_id: "999999"      
    customer_name: "SALAS VIP - EFECTIVO" 
    
    # Precios exactos de los servicios VIP
    known_prices: 
      - 15.0
