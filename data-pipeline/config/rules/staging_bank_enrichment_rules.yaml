      - 360.0
      - 400.0
    
    price_tolerance: 0.05  # Tolerancia estricta por redondeos

# =============================================================================
# NOTAS DE CONFIGURACIÓN
# =============================================================================
# 
# ESTRATEGIA DE BÚSQUEDA:
# ----------------------
# 1. Solo usa bank_ref_2 (NO mezcla con bank_description)
# 2. Clasifica el dato: Número vs Nombre
# 3. Prioridad de fuentes:
#    - HISTÓRICO (4 años de validación manual)
#    - MAESTRO SAP (base oficial)
#    - PORTFOLIO (solo último recurso)
# 
# VALIDACIÓN DE DATOS:
# -------------------
# 1. Filtra histórico (solo registros válidos)
# 2. Valida ID existe en maestro
# 3. Detecta nombres basura
# 4. Usa siempre nombre oficial del maestro
# 5. Validación cruzada histórico-maestro
# 
# NORMALIZACIÓN:
# -------------
# - Figuras jurídicas: SAS, SA, CIA LTDA → normalizadas
# - Core name extraction: remueve figuras jurídicas
# - Smart scoring: 70% core + 30% full similarity
# 
# EXCLUSIONES:
# -----------
# Automáticamente excluye:
# - "FIDEICOMISO MERC" (ajuste contable)
# - "PAGO PROVEEDOR DE PRODUBANCO" (proveedor interno)
# - "NOTA DE CREDITO" (ajuste)
# - "RETENCION" (ajuste)
# 
# GARANTÍAS:
# ---------
# ✅ customer_id: Siempre existe en dim_customers
# ✅ customer_name: Siempre nombre oficial del maestro SAP
# ✅ Nunca asignará basura ("Credenciales - Seminarios")
# ✅ Datos 100% validados y coherentes
# 
# MÉTODOS DE INFERENCIA:
# ---------------------
# - HISTORICAL_REF_MATCH: Número encontrado exacto
# - HISTORICAL_FUZZY_MATCH_VALIDATED: Nombre histórico, validado
# - HISTORICAL_FUZZY_MATCH_CLEANED: Nombre era basura, limpiado
# - MASTER_FUZZY_MATCH: Encontrado directo en maestro
# - PORTFOLIO_ACTIVE_MATCH_VALIDATED: Portfolio, validado con maestro
# 
# =============================================================================