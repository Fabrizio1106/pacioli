version: "FINAL-1.0"

# =============================================================================
# CONFIGURACIÓN FINAL - SMART MATCHING + VALIDACIÓN
# =============================================================================
# Características:
# - Solo usa bank_ref_2 (ignora bank_description)
# - Prioridad: Histórico > Maestro > Portfolio
# - Validación cruzada con maestro SAP
